dataset: weather
data_root: datasets/weather
processed_root: processed/weather
output_root: runs/weather

seed: 42
n_env: 12
env_seed: 42
gaf_max_size: 64
text_emb_dim: 64

diffusion:
  num_steps: 50
  beta_start: 0.0001
  beta_end: 0.5
  schedule: quad

model:
  hidden_size: 128
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  patch_size: 1
  dropout: 0.1

training:
  batch_size: 128
  epochs: 50
  lr: 0.0002
  weight_decay: 0.01
  grad_clip: 1.0
  num_workers: 0
  save_every: 10

evaluation:
  sample_every: 10
  sample_count: 128
  cttp_batch_size: 128
  require_cttp: true
  verbalts_root: ../VerbalTS
  cttp_root: pretrained/Weather_cttp
