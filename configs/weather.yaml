dataset: weather
data_root: datasets/weather
processed_root: processed/weather
output_root: runs/weather

seed: 42
n_env: 12
env_seed: 42
gaf_max_size: 384
text_emb_dim: 64

diffusion:
  objective: rectified_flow
  num_steps: 100
  beta_start: 0.0001
  beta_end: 0.02
  schedule: quad
  lambda_spectral: 0.05
  lambda_cycle_relation: 0.01
  lambda_triad_contrastive: 0.01
  contrastive_temperature: 0.07
  spectral_warmup_power: 1.0
  spectral_mode: abs
  spectral_high_freq_gamma: 1.0
  spectral_dc_weight: 0.05

model:
  architecture: causal_relation_mmdit
  hidden_size: 512
  depth: 12
  num_heads: 8
  mlp_ratio: 4.0
  patch_size: 4
  dropout: 0.1
  text_tokens: 6
  series_register_tokens: 64
  qk_rmsnorm: true
  softclamp: true
  use_semantic_grounding: true
  grounding_num_heads: 4
  grounding_sinkhorn_iters: 24
  grounding_ot_temperature: 0.07
  grounding_mask_temperature: 1.0
  grounding_ot_weight: 0.01
  grounding_mask_weight: 0.01
  grounding_cycle_weight: 0.01
  n_env: 12
  env_dim: 64
  env_slot_mode: dynamic_gaf
  use_text_condition: true
  use_env_condition: true
  env_source: gaf
  routing: text
  env_hidden_channels: 64
  env_num_blocks: 4
  env_kernel_size: 7
  env_expansion: 4
  env_pool_size: 4
  slot_diversity_weight: 0.01
  route_entropy_weight: 0.001
  route_entropy_warmup_epochs: 10
  text_slot_align_weight: 0.01
  text_env_slot_weight: 0.02
  text_drop_prob: 0.1
  env_drop_prob: 0.1
  semantic_drop_prob: 0.1

sampling:
  solver: heun
  guidance_text: 2.0
  guidance_relation: 1.5
  guidance_joint: 1.0

training:
  batch_size: 32
  epochs: 50
  lr: 0.0002
  weight_decay: 0.01
  grad_clip: 1.0
  num_workers: 0
  save_every: 10

evaluation:
  sample_every: 10
  sample_count: 128
  use_gaf_condition: true
  cttp_batch_size: 128
  require_cttp: true
  verbalts_root: ../VerbalTS
  cttp_root: pretrained/Weather_cttp
  best_metrics:
    - name: fid_cttp
      mode: min
    - name: jftsd_cttp
      mode: min
    - name: cttp
      mode: max
